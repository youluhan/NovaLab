<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌸 校园值日小助手 · 可爱大学版</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
            background: #fff5f9;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 50%, #ffe8f0 0%, #fff0f5 100%);
        }

        /* ===== 可爱滚动条 ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #ffe8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #f9a8d4, #f472b6);
            border-radius: 10px;
            border: 2px solid #ffe8f0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #f472b6, #ec4899);
        }

        /* ===== 浮动装饰 ===== */
        .floating-deco {
            position: fixed;
            pointer-events: none;
            font-size: 40px;
            opacity: 0.15;
            z-index: 0;
            animation: floatAnim 8s ease-in-out infinite;
        }
        @keyframes floatAnim {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        /* ===== 登录页面 ===== */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 40%, #e8eaf6 100%);
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .login-box {
            background: white;
            border-radius: 40px;
            padding: 44px 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(244, 114, 182, 0.25), 0 0 0 4px #fce4ec;
            animation: bounceIn 0.8s ease;
            position: relative;
            z-index: 2;
        }
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8) rotate(-3deg);
            }
            60% {
                transform: scale(1.02) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }
        .login-box .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-box .logo .icon {
            font-size: 60px;
            display: block;
            animation: wiggle 3s ease-in-out infinite;
        }
        @keyframes wiggle {
            0%,
            100% {
                transform: rotate(-5deg);
            }
            50% {
                transform: rotate(5deg);
            }
        }
        .login-box .logo h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 8px;
            font-weight: 700;
        }
        .login-box .logo p {
            color: #a78b9a;
            font-size: 15px;
            -webkit-text-fill-color: #a78b9a;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #6b4a5a;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 3px solid #f3e5f5;
            border-radius: 20px;
            font-size: 15px;
            transition: 0.3s;
            background: #faf5f8;
            font-family: inherit;
            color: #4a3a42;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f472b6;
            background: white;
            box-shadow: 0 0 0 6px rgba(244, 114, 182, 0.15);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f472b6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(244, 114, 182, 0.5);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-success {
            background: linear-gradient(135deg, #6ee7b7, #34d399);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 211, 153, 0.4);
        }
        .btn-success:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(52, 211, 153, 0.5);
        }
        .btn-danger {
            background: linear-gradient(135deg, #fca5a5, #f87171);
            color: white;
            box-shadow: 0 4px 15px rgba(248, 113, 113, 0.4);
        }
        .btn-danger:hover {
            transform: translateY(-2px) scale(1.02);
        }
        .btn-warning {
            background: linear-gradient(135deg, #fcd34d, #fbbf24);
            color: #78350f;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }
        .btn-warning:hover {
            transform: translateY(-2px) scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 3px solid #f3e5f5;
            color: #a78b9a;
        }
        .btn-outline:hover {
            border-color: #f472b6;
            color: #f472b6;
            background: #fdf2f8;
        }
        .btn-sm {
            padding: 8px 18px;
            font-size: 13px;
            border-radius: 20px;
            width: auto;
        }
        .btn-xs {
            padding: 5px 14px;
            font-size: 12px;
            border-radius: 16px;
            width: auto;
        }
        .btn-pink {
            background: linear-gradient(135deg, #f9a8d4, #f472b6);
            color: white;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.35);
        }
        .btn-pink:hover {
            transform: translateY(-2px) scale(1.02);
        }
        .btn-purple {
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.35);
        }
        .btn-purple:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .login-tips {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px dashed #f3e5f5;
            text-align: center;
        }
        .login-tips .tag-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .tag {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }
        .tag-pink {
            background: #fce4ec;
            color: #db2777;
            border: 2px solid #f9a8d4;
        }
        .tag-purple {
            background: #f3e8ff;
            color: #7c3aed;
            border: 2px solid #c4b5fd;
        }
        .tag-green {
            background: #d1fae5;
            color: #059669;
            border: 2px solid #6ee7b7;
        }
        .tag-orange {
            background: #fef3c7;
            color: #d97706;
            border: 2px solid #fcd34d;
        }
        .tag-gray {
            background: #f3f4f6;
            color: #6b7280;
            border: 2px solid #d1d5db;
        }
        .tag-success {
            background: #d1fae5;
            color: #059669;
            border: 2px solid #6ee7b7;
        }
        .tag-warning {
            background: #fef3c7;
            color: #d97706;
            border: 2px solid #fcd34d;
        }
        .tag-danger {
            background: #fee2e2;
            color: #dc2626;
            border: 2px solid #fca5a5;
        }

        /* ===== 主应用 ===== */
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* ===== 顶部导航 - 可爱风格 ===== */
        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            padding: 0 28px;
            height: 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(244, 114, 182, 0.12);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 4px solid #fce4ec;
            flex-shrink: 0;
        }
        .navbar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: default;
        }
        .navbar .brand .icon {
            font-size: 32px;
            animation: wiggle 4s ease-in-out infinite;
        }
        .navbar .brand .gradient {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar .brand .sub {
            font-size: 12px;
            -webkit-text-fill-color: #a78b9a;
            background: none;
        }
        .navbar .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .user-area .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f9a8d4, #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            border: 3px solid white;
            box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3);
        }
        .navbar .user-area .uname {
            font-weight: 600;
            color: #4a3a42;
        }
        .navbar .user-area .role-badge {
            font-size: 12px;
            padding: 4px 14px;
            border-radius: 30px;
            background: #fce4ec;
            color: #db2777;
            font-weight: 600;
            border: 2px solid #f9a8d4;
        }
        .navbar .user-area .logout-btn {
            cursor: pointer;
            color: #a78b9a;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 30px;
            transition: 0.2s;
            font-weight: 600;
        }
        .navbar .user-area .logout-btn:hover {
            background: #fce4ec;
            color: #db2777;
        }

        /* ===== 主体 ===== */
        .main {
            display: flex;
            flex: 1;
            padding: 20px 24px;
            gap: 20px;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== 侧边栏 - 可爱圆润 ===== */
        .sidebar {
            width: 210px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 12px;
            box-shadow: 0 8px 32px rgba(244, 114, 182, 0.10);
            border: 3px solid #fce4ec;
            height: fit-content;
            position: sticky;
            top: 92px;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #7a6a72;
            margin-bottom: 4px;
        }
        .sidebar-item:hover {
            background: #fdf2f8;
            color: #db2777;
            transform: translateX(4px);
        }
        .sidebar-item.active {
            background: linear-gradient(135deg, #fce4ec, #f3e8ff);
            color: #7c3aed;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.15);
        }
        .sidebar-item .icon {
            font-size: 22px;
            width: 32px;
            text-align: center;
        }

        /* ===== 内容区 ===== */
        .content {
            flex: 1;
            min-width: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 24px 28px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(244, 114, 182, 0.08);
            border: 3px solid #fce4ec;
            transition: all 0.3s;
        }
        .card:hover {
            box-shadow: 0 12px 40px rgba(244, 114, 182, 0.12);
            transform: translateY(-2px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 3px dashed #f3e5f5;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-header .title {
            font-size: 18px;
            font-weight: 700;
            color: #4a3a42;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header .title .emoji {
            font-size: 24px;
        }
        .card-header .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ===== 统计卡片 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 20px rgba(244, 114, 182, 0.08);
            border: 3px solid #fce4ec;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 8px 30px rgba(244, 114, 182, 0.15);
            border-color: #f9a8d4;
        }
        .stat-card .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        .stat-card .info .value {
            font-size: 28px;
            font-weight: 800;
            color: #4a3a42;
            line-height: 1.2;
        }
        .stat-card .info .label {
            font-size: 13px;
            color: #a78b9a;
            font-weight: 500;
        }

        /* ===== 表格 ===== */
        .table-wrap {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }
        th,
        td {
            padding: 12px 16px;
            text-align: left;
        }
        th {
            background: #fdf2f8;
            font-weight: 700;
            color: #6b4a5a;
            white-space: nowrap;
            font-size: 13px;
        }
        th:first-child {
            border-radius: 16px 0 0 0;
        }
        th:last-child {
            border-radius: 0 16px 0 0;
        }
        tr {
            transition: 0.2s;
        }
        tr:hover td {
            background: #fdf2f8;
        }
        td {
            border-bottom: 2px solid #f3e5f5;
        }
        tr:last-child td:first-child {
            border-radius: 0 0 0 16px;
        }
        tr:last-child td:last-child {
            border-radius: 0 0 16px 0;
        }

        /* ===== 值日卡片列表 ===== */
        .duty-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .duty-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #fdf2f8;
            border-radius: 20px;
            border: 3px solid #fce4ec;
            transition: all 0.3s;
            gap: 18px;
            flex-wrap: wrap;
        }
        .duty-item:hover {
            border-color: #f9a8d4;
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(244, 114, 182, 0.10);
        }
        .duty-item .date-box {
            text-align: center;
            min-width: 70px;
            padding-right: 16px;
            border-right: 3px dashed #f3e5f5;
        }
        .duty-item .date-box .day {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .duty-item .date-box .weekday {
            font-size: 13px;
            color: #a78b9a;
            font-weight: 600;
        }
        .duty-item .info {
            flex: 1;
            min-width: 120px;
        }
        .duty-item .info .task {
            font-weight: 700;
            font-size: 16px;
            color: #4a3a42;
        }
        .duty-item .info .area {
            font-size: 13px;
            color: #a78b9a;
        }
        .duty-item .action {
            margin-left: auto;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }
        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border: 3px solid #f3e5f5;
            border-radius: 20px;
            font-size: 14px;
            background: #faf5f8;
            transition: 0.2s;
            font-family: inherit;
            color: #4a3a42;
        }
        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: #f472b6;
            box-shadow: 0 0 0 6px rgba(244, 114, 182, 0.12);
            background: white;
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: white;
            border-radius: 40px;
            padding: 32px 36px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            animation: popIn 0.4s ease;
            border: 4px solid #fce4ec;
            box-shadow: 0 20px 60px rgba(244, 114, 182, 0.2);
        }
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.85) rotate(-2deg);
            }
            60% {
                transform: scale(1.02) rotate(0.5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            font-size: 20px;
            color: #4a3a42;
            font-weight: 700;
        }
        .modal-header .close {
            cursor: pointer;
            font-size: 28px;
            color: #a78b9a;
            transition: 0.3s;
            line-height: 1;
        }
        .modal-header .close:hover {
            color: #db2777;
            transform: rotate(90deg) scale(1.2);
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #6b4a5a;
            margin-bottom: 6px;
        }
        .modal .form-group input,
        .modal .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 3px solid #f3e5f5;
            border-radius: 18px;
            font-size: 14px;
            transition: 0.2s;
            background: #faf5f8;
            font-family: inherit;
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus {
            outline: none;
            border-color: #f472b6;
            box-shadow: 0 0 0 6px rgba(244, 114, 182, 0.12);
            background: white;
        }
        .modal .btn {
            margin-top: 4px;
        }
        .modal .btn-row {
            display: flex;
            gap: 12px;
        }
        .modal .btn-row .btn {
            flex: 1;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a78b9a;
        }
        .empty-state .icon {
            font-size: 52px;
            display: block;
            margin-bottom: 12px;
        }
        .empty-state .text {
            font-size: 16px;
            font-weight: 500;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 992px) {
            .sidebar {
                width: 160px;
            }
        }
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
            }
            .sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                padding: 8px;
                position: static;
                gap: 4px;
                border-radius: 24px;
            }
            .sidebar-item {
                flex: 1;
                min-width: 60px;
                justify-content: center;
                padding: 10px 12px;
                font-size: 13px;
                margin: 0;
                border-radius: 16px;
            }
            .sidebar-item .label {
                display: none;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .stat-card {
                padding: 14px 16px;
            }
            .stat-card .info .value {
                font-size: 20px;
            }
            .card {
                padding: 16px 18px;
                border-radius: 24px;
            }
            .navbar {
                padding: 0 16px;
                height: 60px;
            }

    <div id="app"></div>

    <script>
        // ================================================================
        //  数据层
        // ================================================================

        let users = [
            { id: 1, username: '2021001', password: '123456', real_name: '张老师', role: 'admin', email: 'zhang@edu.cn',
                class_id: 1 },

                class_id: 1 },

            { id: 9, username: '2021009', password: '123456', real_name: '郑小芳', role: 'student', email: 'zheng@edu.cn',
                class_id: 1 },
            { id: 10, username: '2021010', password: '123456', real_name: '孙小浩', role: 'student', email: 'sun@edu.cn',
                class_id: 1 },
        ];

        let classes = [
            { id: 1, class_name: '计算机科学与技术2021级1班', major: '计算机科学与技术', admin_id: 1 }
        ];

        let areas = [
            { id: 1, area_name: '🌸 A栋-101实验室', description: '计算机基础实验室', class_id: 1 },
            { id: 2, area_name: '📚 A栋-102自习室', description: '开放式自习室', class_id: 1 },
            { id: 3, area_name: '💼 B栋-201会议室', description: '小型会议室', class_id: 1 },
            { id: 4, area_name: '💻 B栋-202机房', description: '专业机房', class_id: 1 },
        ];

        let dutyTypes = [
            { id: 1, type_name: '🧹 桌面整理', description: '整理桌面、摆放物品', required_count: 1, area_id: 1 },
            { id: 2, type_name: '🧽 地面清洁', description: '扫地、拖地', required_count: 2, area_id: 1 },
            { id: 3, type_name: '🔌 设备检查', description: '检查电脑、投影仪', required_count: 1, area_id: 1 },
            { id: 4, type_name: '🪑 桌椅摆放', description: '桌椅归位、整齐摆放', required_count: 2, area_id: 2 },
            { id: 5, type_name: '🧽 地面清洁', description: '扫地、拖地', required_count: 2, area_id: 2 },
            { id: 6, type_name: '☕ 会议准备', description: '准备茶水、资料', required_count: 1, area_id: 3 },
            { id: 7, type_name: '🧹 会后整理', description: '清理会议室', required_count: 2, area_id: 3 },
            { id: 8, type_name: '🔌 设备检查', description: '检查电脑、网络', required_count: 1, area_id: 4 },
            { id: 9, type_name: '🧹 机房清洁', description: '吸尘、整理线路', required_count: 2, area_id: 4 },
        ];

        let dutySchedules = [];
        let checkinLogs = [];
        let currentUser = null;
        let currentPage = 'dashboard';

        // ================================================================
        //  工具函数
        // ================================================================

        function formatDate(date) {
            const d = new Date(date);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2,
            '0');
        }

        function getToday() { return formatDate(new Date()); }

        function getWeekday(dateStr) {
            const w = ['周日 ☀️', '周一 📚', '周二 📖', '周三 📝', '周四 📋', '周五 🎉', '周六 🌸'];
            return w[new Date(dateStr).getDay()];
        }

        function getDayNum(dateStr) { return new Date(dateStr).getDate(); }

        function addDays(dateStr, days) {
            const d = new Date(dateStr);
            d.setDate(d.getDate() + days);
            return formatDate(d);
        }

        function isWeekend(dateStr) {
            const d = new Date(dateStr).getDay();
            return d === 0 || d === 6;
        }

        function getUserName(id) {
            const u = users.find(u => u.id === id);
            return u ? u.real_name : '未知';
        }

        function getAreaName(id) {
            const a = areas.find(a => a.id === id);
            return a ? a.area_name : '未知区域';
        }

        function getTypeName(id) {
            const t = dutyTypes.find(t => t.id === id);
            return t ? t.type_name : '未知任务';
        }

        function getClassStudents(classId) {
            return users.filter(u => u.class_id === classId && u.role !== 'admin');
        }

        function getClassAreas(classId) {
            return areas.filter(a => a.class_id === classId);
        }

        function getAreaTasks(areaId) {
            return dutyTypes.filter(t => t.area_id === areaId);
        }

        function getUserDutyCount(userId) {
            return dutySchedules.filter(s => s.student_id === userId).length;
        }

        function getMaxId(arr) {
            return arr.length > 0 ? Math.max(...arr.map(i => i.id)) : 0;
        }

        // ================================================================
        //  核心业务
        // ================================================================

        function generateSchedule(classId, startDate, endDate) {
            const students = getClassStudents(classId);
            const areas2 = getClassAreas(classId);

            if (students.length === 0) return { success: false, message: '😅 班级还没有学生哦，快添加吧！' };
            if (areas2.length === 0) return { success: false, message: '🏢 还没有值日区域，先配置一下吧！' };

            let allTasks = [];
            areas2.forEach(a => {
                const tasks = getAreaTasks(a.id);
                tasks.forEach(t => {
                    allTasks.push({ ...t, area_name: a.area_name });
                });
            });
            if (allTasks.length === 0) return { success: false, message: '📋 区域还没有任务，请先配置任务哦！' };

            const toRemove = dutySchedules.filter(s =>
                s.class_id === classId &&
                s.duty_date >= startDate &&
                s.duty_date <= endDate
            );
            toRemove.forEach(s => {
                const idx = dutySchedules.indexOf(s);
                if (idx !== -1) dutySchedules.splice(idx, 1);
            });

            let shuffled = [...students];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            let studentIdx = 0;
            let current = new Date(startDate);
            const end = new Date(endDate);
            let created = 0;
            let sid = getMaxId(dutySchedules);
            const dutyCountMap = new Map();
            students.forEach(s => dutyCountMap.set(s.id, getUserDutyCount(s.id)));

            while (current <= end) {
                const dateStr = formatDate(current);
                if (!isWeekend(dateStr)) {
                    const usedStudents = new Set();
                    for (const task of allTasks) {
                        let assigned = 0;
                        let attempts = 0;
                        const maxAttempts = shuffled.length * 5;
                        while (assigned < task.required_count && attempts < maxAttempts) {
                            attempts++;
                            let bestIdx = studentIdx % shuffled.length;
                            let minCount = Infinity;
                            for (let i = 0; i < shuffled.length; i++) {
                                const idx = (studentIdx + i) % shuffled.length;
                                const sid2 = shuffled[idx].id;
                                if (!usedStudents.has(sid2)) {
                                    const cnt = dutyCountMap.get(sid2) || 0;
                                    if (cnt < minCount) { minCount = cnt;
                                        bestIdx = idx; }
                                }
                            }
                            const student = shuffled[bestIdx];
                            studentIdx = (bestIdx + 1) % shuffled.length;
                            if (!usedStudents.has(student.id)) {
                                sid++;
                                dutySchedules.push({
                                    id: sid,
                                    class_id: classId,
                                    student_id: student.id,
                                    student_name: student.real_name,
                                    duty_date: dateStr,
                                    duty_type_id: task.id,
                                    duty_type_name: task.type_name,
                                    area_id: task.area_id || 0,
                                    area_name: task.area_name || '',
                                    status: 'pending'
                                });
                                usedStudents.add(student.id);
                                dutyCountMap.set(student.id, (dutyCountMap.get(student.id) || 0) + 1);
                                assigned++;
                                created++;
                            }
                        }
                    }
                }
                current.setDate(current.getDate() + 1);
            }

            users.forEach(u => {
                if (u.role !== 'admin') {
                    u.duty_count = dutySchedules.filter(s => s.student_id === u.id).length;
                }
            });

            return { success: true, message: `🎉 太棒了！成功生成 ${created} 条排班记录 ✨`, count: created };
        }

        function doCheckin(scheduleId, userId) {
            const s = dutySchedules.find(d => d.id === scheduleId);
            if (!s) return { success: false, message: '😅 记录不见了' };
            if (s.status === 'completed') return { success: false, message: '🌟 已经签到过了哦！' };
            if (s.student_id !== userId) return { success: false, message: '🙈 只能签自己的值日哦' };
            s.status = 'completed';
            checkinLogs.push({
                id: getMaxId(checkinLogs) + 1,
                schedule_id: scheduleId,
                student_id: userId,
                checkin_time: new Date().toLocaleString(),
                ip: '🌸 可爱客户端'
            });
            return { success: true, message: '🎉 签到成功！太棒啦！' };
        }

        function getStatistics(classId, studentId) {
            let filtered = dutySchedules;
            if (classId) filtered = filtered.filter(s => s.class_id === classId);
            if (studentId) filtered = filtered.filter(s => s.student_id === studentId);
            const total = filtered.length;
            const completed = filtered.filter(s => s.status === 'completed').length;
            return {
                total,
                completed,
                pending: total - completed,
                rate: total > 0 ? Math.round((completed / total) * 100) : 0
            };
        }

        function getRanking(classId) {
            const filtered = dutySchedules.filter(s => s.class_id === classId);
            const map = new Map();
            filtered.forEach(s => {
                map.set(s.student_id, (map.get(s.student_id) || 0) + 1);
            });
            return Array.from(map.entries())
                .map(([id, count]) => ({ id, name: getUserName(id), count }))
                .sort((a, b) => b.count - a.count);
        }

        function getAreaStats(classId) {
            const areas2 = getClassAreas(classId);
            return areas2.map(a => {
                const tasks = getAreaTasks(a.id);
                const schedules = dutySchedules.filter(s => s.area_id === a.id && s.class_id === classId);
                const completed = schedules.filter(s => s.status === 'completed').length;
                return {
                    ...a,
                    task_count: tasks.length,
                    schedule_count: schedules.length,
                    completed_count: completed,
                    rate: schedules.length > 0 ? Math.round((completed / schedules.length) * 100) : 0
                };
            });
        }

        function addStudent(username, realName, password, classId) {
            if (users.find(u => u.username === username)) {
                return { success: false, message: '😅 这个学号已经被用了哦' };
            }
            const maxId = getMaxId(users);
            users.push({
                id: maxId + 1,
                username,
                password: password || '123456',
                real_name: realName,
                role: 'student',
                email: '',
                class_id: classId,
                duty_count: 0
            });
            return { success: true, message: '🎉 添加成功！欢迎新同学！' };
        }

        function addArea(areaName, description, classId) {
            const maxId = getMaxId(areas);
            areas.push({
                id: maxId + 1,
                area_name: areaName,
                description: description || '',
                class_id: classId
            });
            return { success: true, message: '🏢 区域添加成功！' };
        }

        function addTask(typeName, description, requiredCount, areaId) {
            const maxId = getMaxId(dutyTypes);
            dutyTypes.push({
                id: maxId + 1,
                type_name: typeName,
                description: description || '',
                required_count: requiredCount || 1,
                area_id: areaId
            });
            return { success: true, message: '📋 任务添加成功！' };
        }

        function login(username, password) {
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = { ...user };
                return { success: true, user };
            }
            return { success: false, message: '😅 学号或密码不对哦，再试试吧' };
        }

        function logout() {
            currentUser = null;
            currentPage = 'dashboard';
        }

        // ================================================================
        //  初始化数据
        // ================================================================

        function initData() {
            if (dutySchedules.length === 0) {
                const today = getToday();
                const end = addDays(today, 14);
                generateSchedule(1, today, end);
            }
        }

        // ================================================================
        //  渲染引擎
        // ================================================================

        function render() {
            const app = document.getElementById('app');
            if (!currentUser) {
                renderLogin(app);
            } else {

        // ---------- 登录 ----------
        function renderLogin(container) {
            container.innerHTML = `

                            <input type="text" id="loginUsername" placeholder="请输入学号" value="2021001">

                        <button class="btn btn-primary" onclick="handleLogin()">🚀 登录小助手</button>

                            <div style="color:#a78b9a;font-size:13px;margin-bottom:6px;">🎀 测试账号</div>
                            <div class="tag-group">
                                <span class="tag tag-purple">👨‍🏫 辅导员: 2021001 / 123456</span>

                                <span class="tag tag-green">👨‍🎓 学生: 2021003 / 123456</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMain(container) {

                    <div class="card">

                        </div>
                        ${todayDuties.length > 0 ? `
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th>区域</th><th>任务</th><th>值日生</th><th>状态</th><th>操作</th></tr></thead>
                                    <tbody>
                                        ${todayDuties.map(d => `

                                                <td>${d.duty_type_name}</td>
                                                <td>${d.student_name}</td>
                                                <td><span class="tag ${d.status === 'completed' ? 'tag-success' : 'tag-warning'}">${d.status === 'completed' ? '✅ 已完成' : '⏳ 待完成'}</span></td>
                                                <td>
                                                    ${d.status !== 'completed' && d.student_id === currentUser.id
                                                        ? `<button class="btn btn-success btn-xs" onclick="handleCheckin(${d.id})">🌟 签到</button>`
                                                        : d.status === 'completed' ? '🎉' : '—'}
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : `
                            <div class="empty-state">
                                <span class="icon">🎉</span>
                                <div class="text">今天没有值日任务，放松一下吧～</div>
                            </div>
                        `}
                    </div>

                    ${upcomingDuties.length > 0 ? `
                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">⏰</span> 即将到来的值日</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>日期</th><th>区域</th><th>任务</th><th>值日生</th></tr></thead>
                                <tbody>
                                    ${upcomingDuties.map(d => `
                                        <tr>
                                            <td>${d.duty_date}</td>
                                            <td>${d.area_name || '—'}</td>
                                            <td>${d.duty_type_name}</td>
                                            <td>${d.student_name}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    ` : ''}

                    ${canManage && ranking.length > 0 ? `
                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">🏆</span> 值日之星排行榜</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>排名</th><th>姓名</th><th>值日次数</th></tr></thead>
                                <tbody>
                                    ${ranking.slice(0, 10).map((r, i) => `
                                        <tr>
                                            <td>${i + 1} ${i === 0 ? '👑' : ''}</td>
                                            <td>${r.name}</td>
                                            <td>${r.count} 次</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    ` : ''}
                `;
            }

            // ===== 排班管理 =====
            else if (currentPage === 'schedule') {
                contentHTML = `
                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">📋</span> 排班管理</span>
                            ${canManage ? `<button class="btn btn-pink btn-sm" onclick="showModal('generateModal')">✨ 生成排班</button>` : ''}
                        </div>
                        <div class="filter-bar">
                            <input type="date" id="filterStart" placeholder="开始日期">
                            <span style="color:#a78b9a;">至</span>
                            <input type="date" id="filterEnd" placeholder="结束日期">
                            <select id="filterStatus">
                                <option value="">全部状态</option>
                                <option value="pending">⏳ 待完成</option>
                                <option value="completed">✅ 已完成</option>
                            </select>
                            ${canManage ? `<select id="filterArea"><option value="">全部区域</option>${allAreas.map(a => `<option value="${a.id}">${a.area_name}</option>`).join('')}</select>` : ''}
                            <button class="btn btn-purple btn-sm" onclick="applyFilter()">🔍 筛选</button>
                            <button class="btn btn-outline btn-sm" onclick="resetFilter()">↻ 重置</button>
                        </div>
                        <div id="scheduleTableWrap">
                            ${renderScheduleTable(canManage)}
                        </div>
                    </div>
                `;
            }

            // ===== 我的值日 =====
            else if (currentPage === 'myduty') {
                const myStats = getStatistics(null, currentUser.id);
                contentHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="icon-box" style="background:#fce4ec;">⭐</div>
                            <div class="info"><div class="value">${myStats.total}</div><div class="label">我的总值日</div></div>
                        </div>
                        <div class="stat-card">
                            <div class="icon-box" style="background:#d1fae5;">✅</div>
                            <div class="info"><div class="value">${myStats.completed}</div><div class="label">已完成</div></div>
                        </div>
                        <div class="stat-card">
                            <div class="icon-box" style="background:#fef3c7;">⏳</div>
                            <div class="info"><div class="value">${myStats.pending}</div><div class="label">待完成</div></div>
                        </div>
                        <div class="stat-card">
                            <div class="icon-box" style="background:#f3e8ff;">📈</div>
                            <div class="info"><div class="value">${myStats.rate}%</div><div class="label">完成率</div></div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">📅</span> 我的值日安排</span>
                            <span class="badge-cute pink">${myDuties.length} 项</span>
                        </div>
                        ${myDuties.length > 0 ? `
                            <div class="duty-list">
                                ${myDuties.map(d => `
                                    <div class="duty-item">
                                        <div class="date-box">
                                            <div class="day">${getDayNum(d.duty_date)}</div>
                                            <div class="weekday">${getWeekday(d.duty_date)}</div>
                                        </div>
                                        <div class="info">
                                            <div class="task">${d.duty_type_name}</div>
                                            <div class="area">📍 ${d.area_name || '—'} · ${d.duty_date}</div>
                                        </div>
                                        <div>
                                            <span class="tag ${d.status === 'completed' ? 'tag-success' : 'tag-warning'}">${d.status === 'completed' ? '✅ 已完成' : '⏳ 待完成'}</span>
                                        </div>
                                        <div class="action">
                                            ${d.status !== 'completed'
                                                ? `<button class="btn btn-success btn-sm" onclick="handleCheckin(${d.id})">🌟 签到</button>`
                                                : '<span style="font-size:24px;">🎉</span>'}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <div class="empty-state">
                                <span class="icon">📭</span>
                                <div class="text">还没有值日安排哦～</div>
                            </div>
                        `}
                    </div>
                `;
            }

            // ===== 系统设置 =====
            else if (currentPage === 'settings' && canManage) {
                contentHTML = `
                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">👥</span> 学生管理（${students.length}人）</span>
                            <button class="btn btn-pink btn-sm" onclick="showModal('studentModal')">＋ 添加学生</button>
                        </div>
                        ${students.length > 0 ? `
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th>姓名</th><th>学号</th><th>角色</th><th>值日次数</th></tr></thead>
                                    <tbody>
                                        ${students.map(s => `
                                            <tr>
                                                <td>${s.real_name}</td>
                                                <td>${s.username}</td>
                                                <td><span class="tag ${s.role === 'monitor' ? 'tag-purple' : 'tag-gray'}">${s.role === 'monitor' ? '👑 班长' : '🎒 学生'}</span></td>
                                                <td>${s.duty_count || 0} 次</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : `
                            <div class="empty-state">
                                <span class="icon">👤</span>
                                <div class="text">还没有学生哦～</div>
                            </div>
                        `}
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">🏢</span> 值日区域管理（${allAreas.length}个）</span>
                            <button class="btn btn-pink btn-sm" onclick="showModal('areaModal')">＋ 添加区域</button>
                        </div>
                        ${allAreas.length > 0 ? `
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th>区域名称</th><th>描述</th><th>任务数</th><th>排班数</th></tr></thead>
                                    <tbody>
                                        ${allAreas.map(a => {
                                            const tasks = getAreaTasks(a.id);
                                            const schedules = dutySchedules.filter(s => s.area_id === a.id);
                                            return `<tr><td>${a.area_name}</td><td>${a.description || '—'}</td><td>${tasks.length}</td><td>${schedules.length}</td></tr>`;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : `
                            <div class="empty-state">
                                <span class="icon">🏢</span>
                                <div class="text">还没有值日区域哦～</div>
                            </div>
                        `}
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">📋</span> 任务管理</span>
                            <button class="btn btn-pink btn-sm" onclick="showModal('taskModal')">＋ 添加任务</button>
                        </div>
                        ${dutyTypes.length > 0 ? `
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th>任务名称</th><th>描述</th><th>所属区域</th><th>需要人数</th></tr></thead>
                                    <tbody>
                                        ${dutyTypes.map(t => `
                                            <tr>
                                                <td>${t.type_name}</td>
                                                <td>${t.description || '—'}</td>
                                                <td>${getAreaName(t.area_id)}</td>
                                                <td>${t.required_count} 人</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : `
                            <div class="empty-state">
                                <span class="icon">📝</span>
                                <div class="text">还没有任务哦～</div>
                            </div>
                        `}
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="title"><span class="emoji">ℹ️</span> 系统信息</span>
                        </div>
                        <div style="color:#6b4a5a;font-size:14px;line-height:2.2;">
                            <div>📌 班级：${classes.find(c => c.id === classId)?.class_name || '未知'}</div>
                            <div>👨‍🏫 管理员：${currentUser.real_name}</div>
                            <div>👨‍🎓 学生总数：${students.length} 人</div>
                            <div>🏢 值日区域：${allAreas.length} 个</div>
                            <div>📋 任务类型：${dutyTypes.length} 项</div>
                            <div>📊 总值日记录：${dutySchedules.filter(s => s.class_id === classId).length} 条</div>
                        </div>
                    </div>
                `;
            }

            // ---------- 完整主界面 ----------
            container.innerHTML = `
                <div class="app">
                    <nav class="navbar">
                        <div class="brand">
                            <span class="icon">🦄</span>
                            <span class="gradient">值日小助手</span>
                            <span class="sub">✨ 大学版</span>
                        </div>
                        <div class="user-area">
                            <div class="avatar">${currentUser.real_name[0]}</div>
                            <span class="uname">${currentUser.real_name}</span>
                            <span class="role-badge">${currentUser.role === 'admin' ? '👨‍🏫 辅导员' : currentUser.role === 'monitor' ? '👑 班长' : '🎒 学生'}</span>
                            <span class="logout-btn" onclick="handleLogout()">🚪 退出</span>
                        </div>
                    </nav>
                    <div class="main">
                        <nav class="sidebar">
                            ${menu.map(item => `
                                <div class="sidebar-item ${currentPage === item.id ? 'active' : ''}" onclick="navigate('${item.id}')">
                                    <span class="icon">${item.icon}</span>
                                    <span class="label">${item.label}</span>
                                </div>
                            `).join('')}
                        </nav>
                        <main class="content">
                            ${contentHTML}
                        </main>
                    </div>
                </div>

                <!-- 生成排班 -->
                <div class="modal-overlay" id="generateModal">
                    <div class="modal">
                        <div class="modal-header"><h3>✨ 生成排班</h3><span class="close" onclick="closeModal('generateModal')">✕</span></div>
                        <div class="form-group"><label>📅 开始日期</label><input type="date" id="genStart" value="${getToday()}"></div>
                        <div class="form-group"><label>📅 结束日期</label><input type="date" id="genEnd" value="${addDays(getToday(), 14)}"></div>
                        <button class="btn btn-primary" onclick="doGenerate()">🚀 开始生成</button>
                    </div>
                </div>

                <!-- 添加学生 -->
                <div class="modal-overlay" id="studentModal">
                    <div class="modal">
                        <div class="modal-header"><h3>➕ 添加学生</h3><span class="close" onclick="closeModal('studentModal')">✕</span></div>
                        <div class="form-group"><label>📚 学号</label><input type="text" id="newUsername" placeholder="学号"></div>
                        <div class="form-group"><label>👤 姓名</label><input type="text" id="newRealName" placeholder="真实姓名"></div>
                        <div class="form-group"><label>🔒 密码</label><input type="text" id="newPassword" value="123456"></div>
                        <button class="btn btn-success" onclick="doAddStudent()">✅ 确认添加</button>
                    </div>
                </div>

                <!-- 添加区域 -->
                <div class="modal-overlay" id="areaModal">
                    <div class="modal">
                        <div class="modal-header"><h3>🏢 添加值日区域</h3><span class="close" onclick="closeModal('areaModal')">✕</span></div>
                        <div class="form-group"><label>🏷️ 区域名称</label><input type="text" id="newAreaName" placeholder="如：A栋-101实验室"></div>
                        <div class="form-group"><label>📝 描述</label><input type="text" id="newAreaDesc" placeholder="区域描述（可选）"></div>
                        <button class="btn btn-purple" onclick="doAddArea()">✅ 确认添加</button>
                    </div>
                </div>

                <!-- 添加任务 -->
                <div class="modal-overlay" id="taskModal">
                    <div class="modal">
                        <div class="modal-header"><h3>📝 添加任务</h3><span class="close" onclick="closeModal('taskModal')">✕</span></div>
                        <div class="form-group"><label>📋 任务名称</label><input type="text" id="newTaskName" placeholder="如：桌面整理"></div>
                        <div class="form-group"><label>📝 描述</label><input type="text" id="newTaskDesc" placeholder="任务描述（可选）"></div>
                        <div class="form-group"><label>🏢 所属区域</label>
                            <select id="newTaskArea">
                                ${allAreas.map(a => `<option value="${a.id}">${a.area_name}</option>`).join('')}
                                ${allAreas.length === 0 ? '<option value="">请先添加区域</option>' : ''}
                            </select>
                        </div>
                        <div class="form-group"><label>👥 需要人数</label><input type="number" id="newTaskCount" value="1" min="1" max="5"></div>
                        <button class="btn btn-warning" onclick="doAddTask()">✅ 确认添加</button>
                    </div>
                </div>
            `;
        }

        // ---------- 排班表格 ----------
        function renderScheduleTable(canManage) {
            let list = [...dutySchedules];
            if (!canManage) {
                list = list.filter(s => s.student_id === currentUser.id);
            }

            const start = document.getElementById('filterStart');
            const end = document.getElementById('filterEnd');
            const status = document.getElementById('filterStatus');
            const area = document.getElementById('filterArea');

            if (start && start.value) list = list.filter(s => s.duty_date >= start.value);
            if (end && end.value) list = list.filter(s => s.duty_date <= end.value);
            if (status && status.value) list = list.filter(s => s.status === status.value);
            if (area && area.value) list = list.filter(s => s.area_id === parseInt(area.value));

            list.sort((a, b) => a.duty_date.localeCompare(b.duty_date));

            if (list.length === 0) {
                return `<div class="empty-state"><span class="icon">📭</span><div class="text">没有找到匹配的记录哦～</div></div>`;
            }

            return `
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>📅 日期</th><th>🏢 区域</th><th>📋 任务</th><th>👤 值日生</th><th>📌 状态</th>${canManage ? '<th>✨ 操作</th>' : ''}</tr></thead>
                        <tbody>
                            ${list.map(s => `
                                <tr>
                                    <td>${s.duty_date}</td>
                                    <td>${s.area_name || '—'}</td>
                                    <td>${s.duty_type_name}</td>
                                    <td>${s.student_name}</td>
                                    <td><span class="tag ${s.status === 'completed' ? 'tag-success' : 'tag-warning'}">${s.status === 'completed' ? '✅ 已完成' : '⏳ 待完成'}</span></td>
                                    ${canManage ? `
                                        <td>
                                            ${s.status !== 'completed'
                                                ? `<button class="btn btn-success btn-xs" onclick="handleAdminCheckin(${s.id})">🌟 签到</button>`
                                                : '🎉'}
                                        </td>
                                    ` : ''}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ================================================================
        //  全局函数
        // ================================================================

        window.handleLogin = function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) { alert('😅 请填写学号和密码哦！'); return; }
            const result = login(username, password);
            if (result.success) {
                render();
            } else {
                alert('😅 ' + result.message);
            }
        };

        window.handleLogout = function() {
            if (confirm('🌸 确认退出吗？')) { logout();
                render(); }
        };

        window.navigate = function(page) {
            currentPage = page;
            render();
        };

        window.showModal = function(id) {
            document.getElementById(id).classList.add('active');
        };

        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('active');
        };

        window.doGenerate = function() {
            const start = document.getElementById('genStart').value;
            const end = document.getElementById('genEnd').value;
            if (!start || !end) { alert('😅 请选择日期范围哦！'); return; }
            if (start > end) { alert('😅 开始日期不能晚于结束日期哦！'); return; }
            const result = generateSchedule(currentUser.class_id, start, end);
            alert(result.message);
            closeModal('generateModal');
            render();
        };

        window.handleCheckin = function(id) {
            const result = doCheckin(id, currentUser.id);
            alert(result.message);
            render();
        };

        window.handleAdminCheckin = function(id) {
            if (!confirm('🌟 确认帮该同学签到吗？')) return;
            const s = dutySchedules.find(d => d.id === id);
            if (!s) { alert('😅 记录不见了'); return; }
            if (s.status === 'completed') { alert('🌟 已经签到过了哦！'); return; }
            s.status = 'completed';
            checkinLogs.push({
                id: getMaxId(checkinLogs) + 1,
                schedule_id: id,
                student_id: s.student_id,
                checkin_time: new Date().toLocaleString(),
                admin_id: currentUser.id,
                ip: '👑 管理员代签'
            });
            alert('🎉 签到成功！太棒啦！');
            render();
        };

        window.applyFilter = function() { render(); };
        window.resetFilter = function() {
            document.getElementById('filterStart').value = '';
            document.getElementById('filterEnd').value = '';
            document.getElementById('filterStatus').value = '';
            const area = document.getElementById('filterArea');
            if (area) area.value = '';
            render();
        };

        window.doAddStudent = function() {
            const username = document.getElementById('newUsername').value.trim();
            const realName = document.getElementById('newRealName').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            if (!username || !realName) { alert('😅 请填写完整信息哦！'); return; }
            const result = addStudent(username, realName, password, currentUser.class_id);
            alert(result.message);
            if (result.success) { closeModal('studentModal');
                render(); }
        };

        window.doAddArea = function() {
            const name = document.getElementById('newAreaName').value.trim();
            const desc = document.getElementById('newAreaDesc').value.trim();
            if (!name) { alert('😅 请输入区域名称哦！'); return; }
            const result = addArea(name, desc, currentUser.class_id);
            alert(result.message);
            if (result.success) { closeModal('areaModal');
                render(); }
        };

        window.doAddTask = function() {
            const name = document.getElementById('newTaskName').value.trim();
            const desc = document.getElementById('newTaskDesc').value.trim();
            const areaId = parseInt(document.getElementById('newTaskArea').value);
            const count = parseInt(document.getElementById('newTaskCount').value) || 1;
            if (!name) { alert('😅 请输入任务名称哦！'); return; }
            if (!areaId) { alert('😅 请选择所属区域哦！'); return; }
            const result = addTask(name, desc, count, areaId);
            alert(result.message);
            if (result.success) { closeModal('taskModal');
                render(); }
        };

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('active');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !currentUser) {
                handleLogin();
            }
        });

        // ================================================================
        //  启动
        // ================================================================

        initData();
        render();
    </script>
</body>
</html>
